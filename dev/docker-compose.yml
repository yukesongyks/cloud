services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    # Increase /dev/shm so parallel aggregates (e.g. rollup SUM over large
    # microdollar_usage JOINs) don't fail with "could not resize shared
    # memory segment" on default 64M tmpfs.
    shm_size: '2gb'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 2s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:13.0.1
    container_name: grafana
    restart: unless-stopped
    profiles: ['grafana']
    environment:
      TERM: linux
      GF_PLUGINS_PREINSTALL: grafana-clock-panel,grafana-polystat-panel,vertamedia-clickhouse-datasource@3.4.11
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID:-e115e769bcdd4c3d66af59d3332cb394}
      CF_AE_TOKEN: ${CF_AE_TOKEN:-}
      GRAFANA_CLICKHOUSE_SECURE: ${GRAFANA_CLICKHOUSE_SECURE:-true}
      GRAFANA_CLICKHOUSE_SKIP_TLS_VERIFY: ${GRAFANA_CLICKHOUSE_SKIP_TLS_VERIFY:-false}
    ports:
      - '4000:3000'
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres_data:
  redis_data:
  grafana_storage:

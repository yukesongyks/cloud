<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deployment Failed</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      font-family:
        -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #1a1a1a;
    "
  >
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #ffffff">
      <tr>
        <td align="center" style="padding: 40px 20px">
          <table width="520" cellpadding="0" cellspacing="0">
            <!-- Header -->
            <tr>
              <td style="padding: 40px 40px 20px">
                <h1
                  style="
                    margin: 0;
                    font-size: 24px;
                    font-weight: 700;
                    color: #1a1a1a;
                    font-family:
                      -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
                      sans-serif;
                  "
                >
                  Deployment Failed
                </h1>
              </td>
            </tr>
            <!-- Body -->
            <tr>
              <td style="padding: 0 40px 30px">
                <p
                  style="
                    margin: 0 0 20px;
                    font-size: 16px;
                    line-height: 24px;
                    color: #333;
                    font-family:
                      -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
                      sans-serif;
                  "
                >
                  Your deployment
                  <strong style="color: #1a1a1a">{{ deployment_name }}</strong> from repository
                  <strong style="color: #1a1a1a">{{ repository }}</strong> has failed.
                </p>
                <!-- CTA Button -->
                <table width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td align="center" style="padding: 20px 0">
                      <a
                        href="{{ deployment_url }}"
                        style="
                          display: inline-block;
                          padding: 10px 20px;
                          background-color: #1a1a1a;
                          color: #ffffff;
                          text-decoration: none;
                          border-radius: 7px;
                          font-size: 13px;
                          font-weight: 600;
                          font-family:
                            -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
                            sans-serif;
                        "
                      >
                        View Deployment
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
          <!-- Branding Footer -->
          <table width="520" cellpadding="0" cellspacing="0">
            <tr>
              <td align="center" style="padding: 30px 20px; border-top: 1px solid #eee">
                <p
                  style="
                    margin: 0;
                    font-size: 11px;
                    color: #ccc;
                    font-family:
                      -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
                      sans-serif;
                  "
                >
                  © {{ year }} Kilo Code, Inc<br />455 Market St, Ste 1940 PMB 993504<br />San
                  Francisco, CA 94105, USA
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
